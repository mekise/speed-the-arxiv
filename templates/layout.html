    <body>
        <script>
            (function() {
                var t = localStorage.getItem('theme');
                if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
            })();
        </script>

                        <button id="theme-toggle" onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;font-size:1.1rem;vertical-align:middle;margin-left:8px;color:inherit;" title="Toggle theme">

                    </h1>
            </div>
        </nav>
        </div>
        <script>
            function toggleTheme() {
                var html = document.documentElement;
                if (html.getAttribute('data-theme') === 'light') {
                    html.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'dark');
                } else {
                    html.setAttribute('data-theme', 'light');
                    localStorage.setItem('theme', 'light');
                }
                updateThemeIcon();
            }
            function updateThemeIcon() {
                var isLight = document.documentElement.getAttribute('data-theme') === 'light';
                document.getElementById('theme-icon-moon').style.display = isLight ? 'inline' : 'none';
                document.getElementById('theme-icon-sun').style.display = isLight ? 'none' : 'inline';
            }
            updateThemeIcon();
        </script>
        <script>
            function updateBodyPadding() {
                var h = document.getElementById('fixed-header');
                if (h) document.body.style.paddingTop = h.offsetHeight + 'px';
            }
            window.addEventListener('load', updateBodyPadding);
            window.addEventListener('resize', updateBodyPadding);
            var _ubpObs = new MutationObserver(updateBodyPadding);
            _ubpObs.observe(document.getElementById('fixed-header'), {childList: true, subtree: true});
        </script>
        <div class="container" id="main-content">
            {% block content %}
            {% endblock %}
        </div>
    </body>

</html>
